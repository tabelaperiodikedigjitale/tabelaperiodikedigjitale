<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemi Periodik i Elementeve - Festivali i Shkencës</title>
    <style>
        :root {
            --bg: #020617; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8;
            --jometal: #22c55e; --alkaline: #ef4444; --alk-tokesore: #f97316;
            --kalimtare: #3b82f6; --pas-kalimtare: #64748b; --metaloid: #eab308;
            --halogjen: #ec4899; --fisnike: #a855f7; --lantanid: #d946ef; --aktinid: #881337;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 2.8rem; color: var(--accent); letter-spacing: 1px; }
        
        .table-container { 
            display: grid; 
            grid-template-columns: 40px repeat(18, minmax(65px, 1fr)); 
            gap: 5px; 
            max-width: 1600px; 
            width: 98%; 
            overflow-x: auto; 
            padding: 15px;
        }
        
        .label { display: flex; align-items: center; justify-content: center; font-weight: bold; color: #64748b; font-size: 13px; }
        
        .element {
            aspect-ratio: 1/1.1; background: var(--card); border: 1px solid #334155;
            border-radius: 6px; padding: 5px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .element:hover { transform: scale(1.3); z-index: 100; border-color: white; box-shadow: 0 0 25px rgba(56, 189, 248, 0.5); }
        
        .el-n { align-self: flex-start; font-size: 10px; color: #94a3b8; font-weight: bold; }
        .el-s { font-size: 1.4rem; font-weight: 900; }
        .el-e { font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; width: 100%; text-transform: uppercase; }

        .jometal { border-bottom: 4px solid var(--jometal); }
        .alkaline { border-bottom: 4px solid var(--alkaline); }
        .alkalino-tokesore { border-bottom: 4px solid var(--alk-tokesore); }
        .kalimtare { border-bottom: 4px solid var(--kalimtare); }
        .pas-kalimtare { border-bottom: 4px solid var(--pas-kalimtare); }
        .metaloid { border-bottom: 4px solid var(--metaloid); }
        .halogjen { border-bottom: 4px solid var(--halogjen); }
        .fisnike { border-bottom: 4px solid var(--fisnike); }
        .lantanid { border-bottom: 4px solid var(--lantanid); }
        .aktinid { border-bottom: 4px solid var(--aktinid); }

        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(8px); }
        #info-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0f172a; border: 3px solid var(--accent); width: 850px; max-width: 95%; padding: 40px; border-radius: 20px; z-index: 1001;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .modal-content { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .atom-visual { background: #020617; border-radius: 15px; padding: 25px; text-align: center; border: 1px solid #1e293b; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; font-size: 1.1rem; }
        .data-row b { color: var(--accent); }
        .close-btn { position: absolute; top: 20px; right: 20px; background: #ef4444; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .bohr-svg { width: 280px; height: 280px; }
        .orbit { fill: none; stroke: #334155; stroke-width: 1.5; }
        .electron { fill: var(--accent); filter: drop-shadow(0 0 2px var(--accent)); }
        .nucleus { fill: #f43f5e; }
        #m-desc { font-style: italic; color: #cbd5e1; margin-top: 20px; font-size: 1rem; line-height: 1.5; }
    </style>
</head>

    {n:118, s:"Og", e:"Oganeson", m:"(294)", c:18, r:7, cat:"fisnike", mp:"80°C", bp:"100°C", conf:"[Rn] 5f¹⁴ 6d¹⁰ 7s² 7p⁶", shells:[2,8,18,32,32,18,8], d:"Elementi i fundit i sistemit periodik; emërtuar për nder të Yuri Oganessian."}
];

function drawAtom(shells) {
    let svg = `<svg class="bohr-svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="12" class="nucleus" />`;
    shells.forEach((count, i) => {
        const radius = 28 + (i * 13);
        svg += `<circle cx="100" cy="100" r="${radius}" class="orbit" />`;
        for (let j = 0; j < count; j++) {
            const angle = (j / count) * Math.PI * 2;
            const x = 100 + radius * Math.cos(angle);
            const y = 100 + radius * Math.sin(angle);
            svg += `<circle cx="${x}" cy="${y}" r="3" class="electron" />`;
        }
    });
    return svg + `</svg>`;
}

const table = document.getElementById('pt');

for (let r = 1; r <= 10; r++) {
    const period = document.createElement('div');
    period.className = 'label';
    period.innerText = r <= 7 ? r : (r === 9 ? "6*" : "7**");
    table.appendChild(period);

    for (let c = 1; c <= 18; c++) {
        const el = elements.find(item => item.r === r && item.c === c);
        if (el) {
            const card = document.createElement('div');
            card.className = `element ${el.cat}`;
            card.innerHTML = `<div class="el-n">${el.n}</div><div class="el-s">${el.s}</div><div class="el-e">${el.e}</div>`;
            card.onclick = () => {
                document.getElementById('m-name').innerText = el.e;
                document.getElementById('m-sym').innerText = el.s;
                document.getElementById('m-mass').innerText = el.m;
                document.getElementById('m-mp').innerText = el.mp || "E panjohur";
                document.getElementById('m-bp').innerText = el.bp || "E panjohur";
                document.getElementById('m-en').innerText = el.en || "N/A";
                document.getElementById('m-conf').innerText = el.conf || "Konfigurimi i shtresave...";
                document.getElementById('m-gp').innerText = `Grupi ${el.c}, Perioda ${el.r > 7 ? (el.r === 9 ? 6 : 7) : el.r}`;
                document.getElementById('m-desc').innerText = el.d;
                document.getElementById('atom-svg').innerHTML = drawAtom(el.shells);
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('info-box').style.display = 'block';
            };
            table.appendChild(card);
        } else {
            table.appendChild(document.createElement('div'));
        }
    }
}

function closeBox() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('info-box').style.display = 'none';
}
</script>
